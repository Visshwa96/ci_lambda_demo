name: Collect & Send CI Data to InfluxDB via Lambda

on:
  push:
    branches: [ main ]

jobs:
  collect-and-send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 1: Collect data.json from all directories into one JSON file
      - name: Collect JSON from all directories
        run: |
          echo ">>> Running collection script..."
          python convert_to_line_protocol.py
          echo ""
          echo ">>> Combined JSON output:"
          cat combined_data.json
        env:
          DATA_DIR: data
          OUTPUT_FILE: combined_data.json

      # Step 2: Send combined JSON to Lambda (Lambda converts to line protocol & writes to InfluxDB)
      - name: Send JSON to Lambda
        run: |
          curl -X POST "$LAMBDA_URL" \
            -H "Content-Type: application/json" \
            -d @combined_data.json \
            --fail --show-error --silent -w "\nHTTP Status: %{http_code}\n"
        env:
          LAMBDA_URL: ${{ secrets.LAMBDA_URL }}
